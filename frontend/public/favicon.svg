<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" /> <!-- blue-400 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- purple-500 -->
    </linearGradient>
  </defs>
  <!-- Background Chart Grid -->
  <rect x="2" y="2" width="20" height="20" rx="4" fill="none" stroke="url(#grad)" stroke-width="2"/>
  
  <!-- Bar 1 -->
  <rect x="6" y="14" width="3" height="4" rx="1" fill="url(#grad)" />
  <!-- Bar 2 -->
  <rect x="10.5" y="9" width="3" height="9" rx="1" fill="url(#grad)" />
  <!-- Bar 3 -->
  <rect x="15" y="12" width="3" height="6" rx="1" fill="url(#grad)" />
</svg>